<!DOCTYPE html>
<html>
<head>

<title>Supervisor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Supervisor</h1>

<div id="who"></div>

<button onclick="logout()">Logout</button>

<hr>

<h2>Shunter Status</h2>

<div id="shunterStatus"></div>

<hr>

<h2>Create Task</h2>

<select id="taskType" onchange="toggleTaskInputs()">
<option value="move">Move Trailer</option>
<option value="power">Provide Power (DD)</option>
</select>

<br><br>

<label>
<input type="checkbox" id="priority">
Gatehouse Priority
</label>

<br><br>

<div id="moveFields">

<input id="trailer" placeholder="Trailer Number">
<input id="from" placeholder="From Location">
<input id="to" placeholder="To Location">

<br><br>

<select id="loadType">
<option value="Full Load">Full Load</option>
<option value="Empty Trailer">Empty Trailer</option>
<option value="Trunk Trailer">Trunk Trailer</option>
</select>

</div>

<br><br>

<button onclick="addTask(this)">Submit Task</button>

<hr>

<h2>Queue (Read Only)</h2>

<div id="queue"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

function requireLogin(){

const name=localStorage.getItem("userName")
const role=localStorage.getItem("userRole")

if(!name || role!=="Supervisor"){
window.location.href="supervisor-login.html"
return false
}

document.getElementById("who").innerHTML="Logged in as "+name

return true
}

function logout(){
localStorage.clear()
window.location.href="index.html"
}

if(requireLogin()){

/* QUEUE */

db.ref("tasks").on("value",snap=>{

let all=[]

snap.forEach(child=>{
let t=child.val()
t.id=child.key
all.push(t)
})

all.sort((a,b)=>a.position-b.position)

const tasks=all.filter(t=>t.status!=="completed")

const div=document.getElementById("queue")
div.innerHTML=""

tasks.forEach((t,i)=>{

let row=document.createElement("div")

row.style.borderBottom="1px solid #333"
row.style.padding="8px"

row.innerHTML=`

<b>${i+1}. ${t.trailer}</b>

<br>

${t.type}

<br>

${t.from || ""} → ${t.to || t.bay || ""}

<br>

${t.loadType || ""}

<br>

Requested by: ${t.requestedBy}

<br>

Status: ${t.status}

`

div.appendChild(row)

})

})

/* SHUNTER STATUS */

db.ref("shunters").on("value",snap=>{

const div=document.getElementById("shunterStatus")
div.innerHTML=""

snap.forEach(child=>{

const s=child.val()

let row=document.createElement("div")

row.innerHTML=`
<b>${child.key}</b> — ${s.status}
`

div.appendChild(row)

})

})

}

</script>

<div class="footer">
Shunt Queue System<br>
© Lee Powell 2026
</div>

</body>
</html>
