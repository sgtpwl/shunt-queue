<!DOCTYPE html>
<html>
<head>
<title>Supervisor - Shunt Tasks</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Create Task</h1>

<select id="taskType" onchange="updateInputs()">
<option value="move">Move Trailer</option>
<option value="power">Provide Power (DD)</option>
</select>

<div id="moveInputs">
<input id="trailer" placeholder="Trailer">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
</div>

<div id="powerInputs" style="display:none;">
<input id="powerTrailer" placeholder="Trailer">
<select id="bay"></select>
</div>

<button onclick="addTask()">Add Task</button>

<div id="msg"></div>

<h2>Finish Power</h2>
<div id="powerList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>

function updateInputs(){

const type=document.getElementById("taskType").value;

document.getElementById("moveInputs").style.display=type==="move"?"block":"none";
document.getElementById("powerInputs").style.display=type==="power"?"block":"none";

}

function populateBays(){

const select=document.getElementById("bay");

for(let i=1;i<=25;i++){

let o=document.createElement("option");
o.value="B"+i;
o.innerText="B"+i;
select.appendChild(o);

}

for(let i=1;i<=26;i++){

let o=document.createElement("option");
o.value="C"+i;
o.innerText="C"+i;
select.appendChild(o);

}

}

populateBays();

</script>

</body>
</html>
