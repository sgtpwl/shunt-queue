<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supervisor</title>

<style>
body{
font-family:Arial;
margin:40px;
}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

.task{
background:#eee;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<h1>Create Task</h1>

<label>Bay</label><br>
<input id="bay"><br>

<label>Trailer</label><br>
<input id="trailer"><br>

<button onclick="addTask()">Add Task</button>

<h2>Queue</h2>
<div id="queue"></div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyACwPAzBK_TFOyIuuI0iNzy_9zW-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


function addTask(){

const bay=document.getElementById("bay").value;
const trailer=document.getElementById("trailer").value;

if(!bay || !trailer){

alert("Enter bay and trailer");
return;

}

const id=db.ref("tasks").push().key;

db.ref("tasks/"+id).set({

bay:bay,
trailer:trailer,
status:"pending",
createdAt:Date.now()

});

document.getElementById("bay").value="";
document.getElementById("trailer").value="";

}


function loadQueue(){

const container=document.getElementById("queue");

db.ref("tasks").on("value",snap=>{

container.innerHTML="";

snap.forEach(child=>{

const t=child.val();

if(t.status==="pending"){

const div=document.createElement("div");
div.className="task";

div.innerText="Bay "+t.bay+" - "+t.trailer;

container.appendChild(div);

}

});

});

}

loadQueue();

</script>

</body>
</html>
