<!DOCTYPE html>
<html>
<head>
  <title>Shunter Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Shunter Login</h1>

<label>Vehicle</label><br>

<select id="vehicle">
<option value="">Select vehicle</option>

<option value="OZS">OZS</option>
<option value="MYJ">MYJ</option>
<option value="XSH">XSH</option>
<option value="TZK">TZK</option>
<option value="SPARE">SPARE</option>

</select>

<br><br>

<label>Driver name</label><br>
<input id="driver" placeholder="Driver name">

<br><br>

<button id="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>

function login(){

const btn=document.getElementById("loginBtn")

btn.disabled=true
btn.innerText="Logging in..."

const vehicle=document.getElementById("vehicle").value
const driver=document.getElementById("driver").value

if(!vehicle || !driver){

alert("Select vehicle and enter driver")

btn.disabled=false
btn.innerText="Login"

return

}

const ref=db.ref("shunters/"+vehicle)

ref.transaction(current=>{

if(current && current.isLoggedIn){

return

}

return{

driver:driver,
status:"available",
isLoggedIn:true,
loginTime:Date.now()

}

},(error,committed)=>{

if(!committed){

alert(vehicle+" already logged in")

btn.disabled=false
btn.innerText="Login"

return

}

localStorage.setItem("vehicle",vehicle)
localStorage.setItem("driver",driver)

window.location.href="shunter.html"

})

}

</script>

</script>

<div class="footer">
Shunt Queue System<br>
© Lee Powell 2026
</div>

</body>
</html>
  
</body>
</html>
