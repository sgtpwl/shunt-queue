<!DOCTYPE html>
<html>
<head>

<title>Select Shunter</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<h1>Select Vehicle</h1>

<div id="vehicles"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>

<script>

const vehicles = ["S1","S2","S3","S4","SPARE"];

const container = document.getElementById("vehicles");

vehicles.forEach(v => {

const btn = document.createElement("button");

btn.innerText = v;

btn.style.width="90%";
btn.style.height="80px";
btn.style.fontSize="28px";
btn.style.margin="10px";

btn.onclick = () => loginVehicle(v);

container.appendChild(btn);

});

function loginVehicle(vehicle){

db.ref("shunters/"+vehicle).once("value", snap => {

if(snap.exists()){

alert(vehicle+" already logged in");

return;

}

db.ref("shunters/"+vehicle).set({

status:"available",
loginTime:Date.now()

});

localStorage.setItem("vehicle",vehicle);

window.location.href="shunter.html";

});

}

</script>

</body>
</html>
