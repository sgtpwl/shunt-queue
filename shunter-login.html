<!DOCTYPE html>
<html>
<head>
  <title>Shunter Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Shunter Login</h1>

<label>Vehicle</label><br>
<select id="vehicle">
  <option value="">Select vehicle</option>
  <option value="S1">S1</option>
  <option value="S2">S2</option>
  <option value="S3">S3</option>
  <option value="S4">S4</option>
</select>

<br><br>

<label>Driver name</label><br>
<input id="driver" placeholder="e.g. Dave">

<br><br>

<button id="loginBtn" onclick="login()">Login</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>
function login(){

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.innerText = "Logging in...";

  const vehicle = (document.getElementById("vehicle").value || "").trim();
  const driver = (document.getElementById("driver").value || "").trim();

  if(!vehicle || !driver){
    alert("Select a vehicle and enter driver name");
    btn.disabled = false;
    btn.innerText = "Login";
    return;
  }

  // Lock vehicle so only one login per vehicle at a time
  const ref = db.ref("shunters/" + vehicle);

  ref.transaction(current => {

    // if someone already logged in and hasn't been cleared, block
    if(current && current.isLoggedIn){
      return; // abort
    }

    return {
      driver: driver,
      status: "available",
      isLoggedIn: true,
      loginTime: Date.now()
    };

  }, (error, committed) => {

    if(error){
      console.error(error);
      alert("Login failed");
      btn.disabled = false;
      btn.innerText = "Login";
      return;
    }

    if(!committed){
      alert(vehicle + " is already logged in on another device.");
      btn.disabled = false;
      btn.innerText = "Login";
      return;
    }

    localStorage.setItem("vehicle", vehicle);
    localStorage.setItem("driver", driver);

    window.location.href = "shunter.html";
  });

}
</script>

</body>
</html>
