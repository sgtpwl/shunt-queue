<!DOCTYPE html>
<html>
<head>

<title>Shunter Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Shunter Login</h1>

<label>Vehicle</label>
<br>

<select id="vehicle">

<option value="">Select Vehicle</option>

<option value="OZS">OZS</option>
<option value="MYJ">MYJ</option>
<option value="XSH">XSH</option>
<option value="TZK">TZK</option>
<option value="SPARE">SPARE</option>

</select>

<br><br>

<label>Driver Name</label>
<br>

<input id="driver" placeholder="Enter your name">

<br><br>

<button id="loginBtn" onclick="login()">Login</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

function login(){

let vehicle=document.getElementById("vehicle").value
let driver=document.getElementById("driver").value

if(!vehicle){
alert("Select vehicle")
return
}

if(!driver){
alert("Enter your name")
return
}

const button=document.getElementById("loginBtn")

button.innerText="Logging in..."
button.disabled=true

/* save locally */

localStorage.setItem("vehicle",vehicle)
localStorage.setItem("driver",driver)

/* register shunter */

db.ref("shunters/"+vehicle).set({

driver:driver,
status:"available",
lastSeen:Date.now()

})
.then(()=>{

window.location.href="shunter.html"

})
.catch(err=>{

alert("Login failed")
button.innerText="Login"
button.disabled=false

})

}

</script>

<div class="footer">
Shunt Queue System<br>
© Lee Powell 2026
</div>

</body>
</html>
