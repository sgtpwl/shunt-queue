<!DOCTYPE html>
<html>
<head>
  <title>Shunt Queue - Shunter</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Next Task</h1>
<div id="nextTask">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyACwPAzBK_TFOyIuuI0iNzy_9zW-CKA7m4",
  authDomain: "shunt-queue.firebaseapp.com",
  databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shunt-queue",
  storageBucket: "shunt-queue.appspot.com",
  messagingSenderId: "773776993625",
  appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getVehicle() {
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "Unknown";
}

function acceptTask(id) {
  db.ref("tasks/" + id).update({
    status: "accepted",
    acceptedBy: getVehicle()
  });
}

function completeTask(id) {
  db.ref("tasks/" + id).remove();
}

function loadNextTask() {

  db.ref("tasks").orderByChild("created")
  .on("value", function(snapshot) {

    const vehicle = getVehicle();
    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let taskId = null;
    let task = null;

    snapshot.forEach(function(child) {
      const t = child.val();

      // If task already accepted by THIS vehicle
      if (!task && t.status === "accepted" && t.acceptedBy === vehicle) {
        taskId = child.key;
        task = t;
      }

      // Otherwise show first waiting job
      if (!task && t.status === "waiting") {
        taskId = child.key;
        task = t;
      }
    });

    if (!task) {
      taskDiv.innerHTML = "<div class='task'>No tasks waiting</div>";
      return;
    }

    let button = "";

    if (task.status === "waiting") {
      button = `<button onclick="acceptTask('${taskId}')">ACCEPT</button>`;
    }

    if (task.status === "accepted" && task.acceptedBy === vehicle) {
      button = `<button onclick="completeTask('${taskId}')">COMPLETE</button>`;
    }

    taskDiv.innerHTML = `
      <div class="task">
        <h2>${task.trailer}</h2>
        <p><strong>${task.type}</strong></p>
        <p>${task.from || ""} ${task.to ? "→ " + task.to : ""}</p>
        <p>Status: ${task.status}</p>
        ${task.acceptedBy ? `<p>Accepted by: ${task.acceptedBy}</p>` : ""}
        ${button}
      </div>
    `;
  });
}

window.onload = loadNextTask;
</script>

</body>
</html>
