<!DOCTYPE html>
<html>
<head>
  <title>Shunt Queue - Shunter</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Next Task</h1>
<div id="nextTask">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyACwPAzBK_TFOyIuuI0iNzy_9zW-CKA7m4",
  authDomain: "shunt-queue.firebaseapp.com",
  databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shunt-queue",
  storageBucket: "shunt-queue.appspot.com",
  messagingSenderId: "773776993625",
  appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getVehicle() {
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "Unknown";
}

function acceptTask(id) {
  db.ref("tasks/" + id).update({
    status: "accepted",
    acceptedBy: getVehicle()
  });
}

function completeTask(id) {
  db.ref("tasks/" + id).remove();
}

function loadNextTask() {

  db.ref("tasks").orderByChild("created")
  .on("value", function(snapshot) {

    const vehicle = getVehicle();
    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let acceptedTask = null;
    let acceptedId = null;

    let waitingTask = null;
    let waitingId = null;

    snapshot.forEach(function(child) {

      const t = child.val();

      // PRIORITY 1: job already accepted by this vehicle
      if (!acceptedTask && t.status === "accepted" && t.acceptedBy === vehicle) {
        acceptedTask = t;
        acceptedId = child.key;
      }

      // PRIORITY 2: first waiting job
      if (!waitingTask && t.status === "waiting") {
        waitingTask = t;
        waitingId = child.key;
      }

    });

    // Show accepted job first
    if (acceptedTask) {

      taskDiv.innerHTML = `
        <div class="task">
          <h2>${acceptedTask.trailer}</h2>
          <p><strong>${acceptedTask.type}</strong></p>
          <p>${acceptedTask.from || ""} ${acceptedTask.to ? "→ " + acceptedTask.to : ""}</p>
          <p><strong>Status:</strong> accepted</p>
          <p><strong>Accepted by:</strong> ${vehicle}</p>
          <button onclick="completeTask('${acceptedId}')">COMPLETE</button>
        </div>
      `;

      return;
    }

    // Otherwise show next waiting job
    if (waitingTask) {

      taskDiv.innerHTML = `
        <div class="task">
          <h2>${waitingTask.trailer}</h2>
          <p><strong>${waitingTask.type}</strong></p>
          <p>${waitingTask.from || ""} ${waitingTask.to ? "→ " + waitingTask.to : ""}</p>
          <p><strong>Status:</strong> waiting</p>
          <button onclick="acceptTask('${waitingId}')">ACCEPT</button>
        </div>
      `;

      return;
    }

    taskDiv.innerHTML = "<div class='task'>No tasks waiting</div>";

  });
}

window.onload = loadNextTask;
</script>

</body>
</html>
