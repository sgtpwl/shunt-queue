<!DOCTYPE html>
<html>
<head>
  <title>Supervisor - Shunt Queue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Supervisor</h1>

<h2>Create Task</h2>

<select id="taskType" onchange="toggleTaskInputs()">
  <option value="move">Move Trailer</option>
  <option value="power">Provide Power (DD)</option>
</select>

<div style="margin-top:8px;">
  <label>
    <input type="checkbox" id="priority">
    Gatehouse Priority
  </label>
</div>

<div id="moveFields" style="margin-top:10px;">

  <input id="trailer" placeholder="Trailer Number">
  <input id="from" placeholder="From Location">
  <input id="to" placeholder="To Location">

  <select id="loadType">
    <option>Full Load</option>
    <option>Empty Trailer</option>
    <option selected>Trunk Trailer</option>
  </select>

</div>

<div id="powerFields" style="display:none; margin-top:10px;">

  <input id="powerTrailer" placeholder="Trailer Number">

  <select id="bay">
    <option value="">Select Bay</option>
  </select>

</div>

<br>

<button onclick="addTask(this)">Submit Task</button>

<p id="msg"></p>

<hr>

<h2>Queue (Read Only)</h2>
<div id="queue"></div>

<script>
  function toggleTaskInputs(){
    const type = document.getElementById("taskType").value;
    document.getElementById("moveFields").style.display = (type==="move") ? "block" : "none";
    document.getElementById("powerFields").style.display = (type==="power") ? "block" : "none";
  }

  // populate bays
  (function(){
    const bay = document.getElementById("bay");
    for (let i=1;i<=25;i++){
      const o=document.createElement("option");
      o.value="B"+i; o.innerText="B"+i;
      bay.appendChild(o);
    }
    for (let i=1;i<=26;i++){
      const o=document.createElement("option");
      o.value="C"+i; o.innerText="C"+i;
      bay.appendChild(o);
    }
  })();
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>
  function renderQueue(){
    db.ref("tasks").on("value", snap => {
      const div = document.getElementById("queue");
      div.innerHTML = "";

      let tasks = [];
      snap.forEach(child=>{
        let t = child.val() || {};
        t.id = child.key;
        tasks.push(t);
      });

      tasks.sort((a,b)=>(a.position||0)-(b.position||0));

      tasks.forEach((t, idx)=>{
        const row=document.createElement("div");
        row.className="task";

        const pri = t.priority ? "⚠ PRIORITY<br>" : "";
        const who = (t.status==="accepted") ? `<br>Accepted: ${t.acceptedBy || ""} (${t.driver || ""})` : "";
        const loc = (t.type==="Move Trailer")
          ? `${t.from || ""} → ${t.to || ""}<br>${(t.loadType || "").toUpperCase()}`
          : `Bay ${t.bay || ""}`;

        row.innerHTML = `
          <b>${idx+1}. ${t.trailer || ""}</b><br>
          ${pri}
          ${t.type || ""}<br>
          ${loc}<br>
          Status: ${t.status || ""}
          ${who}
        `;

        div.appendChild(row);
      });
    });
  }

  renderQueue();
</script>

</body>
</html>
