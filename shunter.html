<!DOCTYPE html>
<html>
<head>

<title>Shunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body class="shunterScreen">

<h2 id="vehicle"></h2>

<div id="taskArea">
Loading...
</div>

<br>

<div id="breakControls"></div>

<button onclick="logout()">End Shift</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

const vehicle = localStorage.getItem("vehicle")
const driver = localStorage.getItem("driver")

if(!vehicle){
window.location.href="shunter-login.html"
}

document.getElementById("vehicle").innerText =
vehicle + " - " + driver


db.ref("tasks").on("value", snap => {

let tasks=[]

snap.forEach(child=>{
let t=child.val()
t.id=child.key
tasks.push(t)
})

tasks = tasks.filter(t=>t.status!=="completed")

tasks.sort((a,b)=>(a.position||0)-(b.position||0))

let mine = tasks.find(t=>t.status==="accepted" && t.acceptedBy===vehicle)
let next = tasks.find(t=>t.status==="waiting")

let task = mine || next

const div=document.getElementById("taskArea")

if(!task){
div.innerHTML="No tasks waiting"
return
}

let location=""

if(task.type==="Move Trailer"){

location=(task.from||"?")+" → "+(task.to||"?")

}else{

location="Bay "+(task.bay||"")

}

let html = `

<h2>Trailer ${task.trailer}</h2>

<div class="big">${task.type}</div>

<div class="big">${location}</div>

<div class="big">${task.loadType || ""}</div>

`

if(task.priority){
html+=`<div class="priority">PRIORITY</div>`
}

if(task.status==="waiting"){
html+=`<button onclick="acceptTask('${task.id}')">ACCEPT</button>`
}

if(task.status==="accepted" && task.acceptedBy===vehicle){

html+=`<button onclick="completeTask('${task.id}')">COMPLETE</button>`

if(task.priority){
html+=`<br><button onclick="notifyGatehouse('${task.id}')">Notify Gatehouse</button>`
}

}

div.innerHTML=html

})


function updateBreakButtons(){

db.ref("shunters/"+vehicle).on("value", snap=>{

let s=snap.val()

const div=document.getElementById("breakControls")

if(!s || s.status!=="break"){

div.innerHTML=`
<button onclick="startBreak()">Start Break</button>
`

}else{

div.innerHTML=`
<button onclick="endBreak()">End Break</button>
`

}

})

}

updateBreakButtons()


function startBreak(){

db.ref("shunters/"+vehicle).update({

status:"break",
breakStart:Date.now()

})

}

function endBreak(){

db.ref("shunters/"+vehicle).update({

status:"available"

})

}

function logout(){

db.ref("shunters/"+vehicle).remove()

localStorage.clear()

window.location.href="index.html"

}

</script>

</body>
</html>
