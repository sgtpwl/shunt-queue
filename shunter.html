<!DOCTYPE html>
<html>
<head>
  <title>Shunt Queue - Shunter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Next Task</h1>

<div id="nextTask">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>

function acceptTask(id) {
  db.ref("tasks/" + id).update({
    status: "accepted"
  });
}

function completeTask(id) {
  db.ref("tasks/" + id).remove();
}

function loadNextTask() {

  db.ref("tasks").orderByChild("created").limitToFirst(1)
  .on("value", snapshot => {

    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let taskId = null;
    let task = null;

    snapshot.forEach(child => {
      taskId = child.key;
      task = child.val();
    });

    if (!task) {
      taskDiv.innerHTML = "No tasks waiting";
      return;
    }

    taskDiv.innerHTML = `
      <div class="task">
        <h2>${task.trailer}</h2>
        <p>${task.type}</p>
        <p>${task.from || ""} ${task.to ? "→ " + task.to : ""}</p>
        <p><b>Status:</b> ${task.status}</p>

        ${task.status === "waiting"
          ? `<button onclick="acceptTask('${taskId}')">ACCEPT</button>`
          : `<button onclick="completeTask('${taskId}')">COMPLETE</button>`
        }
      </div>
    `;

  });

}

window.onload = loadNextTask;

</script>

</body>
</html>
