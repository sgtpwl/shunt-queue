<script>

function getVehicle() {
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "Unknown";
}

function acceptTask(id) {
  db.ref("tasks/" + id).update({
    status: "accepted",
    acceptedBy: getVehicle()
  });
}

function completeTask(id) {
  db.ref("tasks/" + id).remove();
}

function loadNextTask() {

  db.ref("tasks").orderByChild("created").limitToFirst(1)
  .on("value", snapshot => {

    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let taskId = null;
    let task = null;

    snapshot.forEach(child => {
      taskId = child.key;
      task = child.val();
    });

    if (!task) {
      taskDiv.innerHTML = "No tasks waiting";
      return;
    }

    taskDiv.innerHTML = `
      <div class="task">
        <h2>${task.trailer}</h2>
        <p>${task.type}</p>
        <p>${task.from || ""} ${task.to ? "→ " + task.to : ""}</p>
        <p><b>Status:</b> ${task.status}</p>
        ${task.acceptedBy ? `<p><b>Accepted by:</b> ${task.acceptedBy}</p>` : ""}

        ${task.status === "waiting"
          ? `<button onclick="acceptTask('${taskId}')">ACCEPT</button>`
          : `<button onclick="completeTask('${taskId}')">COMPLETE</button>`
        }
      </div>
    `;

  });

}

window.onload = loadNextTask;

</script>
