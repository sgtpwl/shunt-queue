<!DOCTYPE html>
<html>
<head>
<title>Shunter Tasks</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div style="display:flex;justify-content:space-between;padding:10px;align-items:center;">

<h2 id="vehicleInfo"></h2>

<div>
<button onclick="setBreak()">Break</button>
<button onclick="backFromBreak()">Back</button>
<button onclick="endShift()">End Shift</button>
</div>

</div>

<h1 style="text-align:center;">Task</h1>

<div id="screen" style="padding:20px;text-align:center;">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>

function vehicle(){
return localStorage.getItem("vehicle");
}

function driver(){
return localStorage.getItem("driver");
}

function logEvent(event){

db.ref("shiftEvents").push({
vehicle:vehicle(),
driver:driver(),
event:event,
time:Date.now()
});

}

function endShift(){

logEvent("end shift");

db.ref("shunters/"+vehicle()).remove();
db.ref("powerConnections/"+vehicle()).remove();

localStorage.clear();

window.location.href="shunter-login.html";

}

function setBreak(){

db.ref("shunters/"+vehicle()).update({
status:"break",
breakStart:Date.now()
});

logEvent("break");

document.getElementById("screen").innerHTML="<h2>ON BREAK</h2>";

}

function backFromBreak(){

db.ref("shunters/"+vehicle()).update({
status:"available",
breakStart:null
});

logEvent("back");

}

function acceptTask(id){

db.ref("tasks/"+id).update({
status:"accepted",
acceptedBy:vehicle(),
driver:driver(),
acceptedTime:Date.now()
});

db.ref("shunters/"+vehicle()).update({
status:"busy"
});

}

function completeTask(id){

db.ref("tasks/"+id).update({
status:"completed",
completedTime:Date.now()
});

db.ref("shunters/"+vehicle()).update({
status:"available"
});

}

function loadTasks(){

db.ref("tasks").on("value",snapshot=>{

const v=vehicle();

const div=document.getElementById("screen");

let tasks=[];

snapshot.forEach(child=>{
let t=child.val();
t.id=child.key;
tasks.push(t);
});

tasks=tasks.filter(t=>t.status!=="completed");

tasks.sort((a,b)=>a.position-b.position);

let myTask=tasks.find(t=>t.acceptedBy===v && t.status==="accepted");

if(myTask){

div.innerHTML=`
<h2>${myTask.trailer}</h2>
<p>${myTask.type}</p>

<button onclick="completeTask('${myTask.id}')"
style="width:90%;height:80px;font-size:28px">
COMPLETE
</button>
`;

return;

}

let nextTask=tasks.find(t=>t.status==="waiting");

if(nextTask){

div.innerHTML=`
<h2>${nextTask.trailer}</h2>
<p>${nextTask.type}</p>

<button onclick="acceptTask('${nextTask.id}')"
style="width:90%;height:80px;font-size:28px">
ACCEPT
</button>
`;

return;

}

div.innerHTML="No tasks waiting";

});

}

window.onload=function(){

document.getElementById("vehicleInfo").innerText=
"Vehicle: "+vehicle()+" | Driver: "+driver();

loadTasks();

}

</script>

</body>
</html>
