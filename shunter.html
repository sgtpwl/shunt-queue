<!DOCTYPE html>
<html>
<head>
<title>Shunter Tasks</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;">
<h2 id="shunterName"></h2>
<button onclick="logout()">Logout</button>
</div>

<h1 style="text-align:center;">Next Task</h1>

<div id="nextTask" style="padding:20px;text-align:center;">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyACwPAzBK_TFOyIuuI0iNzy_9zW-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function logout(){
localStorage.removeItem("shunterName");
window.location.href="shunter-login.html";
}

function getShunter(){
return localStorage.getItem("shunterName");
}

function acceptTask(id){
db.ref("tasks/"+id).update({
status:"accepted",
acceptedBy:getShunter()
});
}

function completeTask(id){
db.ref("tasks/"+id).remove();
}

function loadNextTask(){

db.ref("tasks").on("value",function(snapshot){

const shunter=getShunter();
const taskDiv=document.getElementById("nextTask");
taskDiv.innerHTML="";

let tasks=[];

snapshot.forEach(function(child){
let t=child.val();
t.id=child.key;
tasks.push(t);
});

tasks.sort((a,b)=>a.created-b.created);

// FIRST: check if this shunter already has a job
let myTask=tasks.find(t => t.status==="accepted" && t.acceptedBy===shunter);

if(myTask){

taskDiv.innerHTML=`
<div class="task">
<h2 style="font-size:40px;">${myTask.trailer}</h2>
<p style="font-size:28px;"><strong>${myTask.type}</strong></p>
<p style="font-size:24px;">${myTask.from || ""} ${myTask.to ? "→ "+myTask.to : ""}</p>
<button onclick="completeTask('${myTask.id}')" style="width:90%;height:80px;font-size:28px;">COMPLETE</button>
</div>
`;

return;
}

// SECOND: find first job nobody has accepted
let nextTask=tasks.find(t => t.status==="waiting");

if(nextTask){

taskDiv.innerHTML=`
<div class="task">
<h2 style="font-size:40px;">${nextTask.trailer}</h2>
<p style="font-size:28px;"><strong>${nextTask.type}</strong></p>
<p style="font-size:24px;">${nextTask.from || ""} ${nextTask.to ? "→ "+nextTask.to : ""}</p>
<button onclick="acceptTask('${nextTask.id}')" style="width:90%;height:80px;font-size:28px;">ACCEPT</button>
</div>
`;

return;
}

taskDiv.innerHTML="<div class='task'>No tasks waiting</div>";

});

}

window.onload=function(){

const shunter=getShunter();

if(!shunter){
window.location.href="shunter-login.html";
return;
}

document.getElementById("shunterName").innerText="Shunter: "+shunter;

loadNextTask();

}

</script>

</body>
</html>
