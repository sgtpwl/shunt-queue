<!DOCTYPE html>
<html>
<head>

<title>Shunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body class="shunterScreen">

<h2 id="vehicle"></h2>

<div id="taskArea">

Loading...

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

const vehicle=localStorage.getItem("vehicle")
const driver=localStorage.getItem("driver")

if(!vehicle){

window.location.href="shunter-login.html"

}

document.getElementById("vehicle").innerText=
vehicle+" - "+driver


function loadTask(){

db.ref("tasks").on("value",snap=>{

let tasks=[]

snap.forEach(child=>{

let t=child.val()
t.id=child.key

tasks.push(t)

})

tasks=tasks.filter(t=>t.status!=="completed")

tasks.sort((a,b)=>(a.position||0)-(b.position||0))

let mine=tasks.find(t=>t.status==="accepted" && t.acceptedBy===vehicle)

let next=tasks.find(t=>t.status==="waiting")

let task=mine||next

const div=document.getElementById("taskArea")

if(!task){

div.innerHTML="No tasks waiting"
return

}

let priority=task.priority?"<div class='priority'>PRIORITY</div>":""

let job=task.type

let location=""

if(job==="Move Trailer"){

location=(task.from||"")+" → "+(task.to||"")

}else{

location="Bay "+task.bay

}

let load=task.loadType||""

let html=`

<h2>${task.trailer}</h2>

<div class="big">${job}</div>

<div class="big">${location}</div>

<div class="big">${load}</div>

${priority}

`

if(task.status==="waiting"){

html+=`<button onclick="acceptTask('${task.id}')">ACCEPT</button>`

}

if(task.status==="accepted" && task.acceptedBy===vehicle){

html+=`<button onclick="completeTask('${task.id}')">COMPLETE</button>`

if(task.priority && job==="Move Trailer"){

html+=`<br><button onclick="notifyGatehouse('${task.id}')">Notify Gatehouse</button>`

}

}

div.innerHTML=html

})

}

loadTask()

</script>

</body>
</html>
