<!DOCTYPE html>
<html>
<head>
<title>Shunter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Shunter</h1>

<div id="loginArea">
    <select id="vehicle">
        <option value="OZS">OZS</option>
        <option value="MYJ">MYJ</option>
        <option value="XSH">XSH</option>
        <option value="TZK">TZK</option>
        <option value="SPARE">SPARE</option>
    </select>

    <input id="driverName" placeholder="Driver name">

    <button onclick="login()">Login</button>
</div>

<div id="mainArea" style="display:none">

<h2 id="vehicleTitle"></h2>

<div id="taskArea"></div>

<br>

<button onclick="startBreak()">Break</button>
<button onclick="endBreak()">End Break</button>
<button onclick="logout()">End Shift</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>

let currentVehicle = null
let driverName = null

function login(){

    currentVehicle = document.getElementById("vehicle").value
    driverName = document.getElementById("driverName").value

    if(driverName==""){
        alert("Enter driver name")
        return
    }

    db.ref("shunters/"+currentVehicle).set({
        online:true,
        driver:driverName,
        break:false
    })

    document.getElementById("loginArea").style.display="none"
    document.getElementById("mainArea").style.display="block"

    document.getElementById("vehicleTitle").innerText=currentVehicle+" ("+driverName+")"

    watchTasks()
}

function logout(){

    db.ref("shunters/"+currentVehicle).remove()

    location.reload()
}

function startBreak(){

    db.ref("shunters/"+currentVehicle+"/break").set(true)

}

function endBreak(){

    db.ref("shunters/"+currentVehicle+"/break").set(false)

}

function watchTasks(){

    db.ref("tasks").on("value",snapshot=>{

        let tasks=[]

        snapshot.forEach(child=>{
            let t=child.val()
            t.id=child.key
            tasks.push(t)
        })

        tasks.sort((a,b)=>a.position-b.position)

        let myTask = tasks.find(t=>t.acceptedBy==currentVehicle && t.status!="completed")

        if(myTask){
            renderMyTask(myTask)
            return
        }

        let nextTask = tasks.find(t=>!t.acceptedBy && t.status=="waiting")

        if(nextTask){
            renderNextTask(nextTask)
        }else{
            document.getElementById("taskArea").innerHTML="<h3>No tasks waiting</h3>"
        }

    })

}

function renderMyTask(task){

let html=""

html+="<h2>Current Task</h2>"

html+="<div class='taskCard'>"

html+="<b>Trailer:</b> "+task.trailer+"<br>"
html+="<b>Job:</b> "+task.type+"<br>"

if(task.type=="Move Trailer"){

html+="<b>From:</b> "+task.from+"<br>"
html+="<b>To:</b> "+task.to+"<br>"

}

if(task.type=="Provide Power (DD)"){

html+="<b>Bay:</b> "+task.bay+"<br>"

}

html+="<b>Load:</b> "+task.loadType+"<br><br>"

html+="<button onclick='completeTask(\""+task.id+"\")'>Complete Task</button>"

html+="</div>"

document.getElementById("taskArea").innerHTML=html

}

function renderNextTask(task){

let html=""

html+="<h2>Next Task</h2>"

html+="<div class='taskCard'>"

html+="<b>Trailer:</b> "+task.trailer+"<br>"
html+="<b>Job:</b> "+task.type+"<br>"

if(task.type=="Move Trailer"){

html+="<b>From:</b> "+task.from+"<br>"
html+="<b>To:</b> "+task.to+"<br>"

}

if(task.type=="Provide Power (DD)"){

html+="<b>Bay:</b> "+task.bay+"<br>"

}

html+="<b>Load:</b> "+task.loadType+"<br><br>"

html+="<button onclick='acceptTask(\""+task.id+"\")'>Accept Task</button>"

html+="</div>"

document.getElementById("taskArea").innerHTML=html

}

function acceptTask(id){

db.ref("tasks/"+id).update({
acceptedBy:currentVehicle,
acceptedTime:Date.now(),
status:"accepted"
})

}

function completeTask(id){

db.ref("tasks/"+id).update({
completedTime:Date.now(),
status:"completed"
})

}

</script>

</body>
</html>
