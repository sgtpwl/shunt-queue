<!DOCTYPE html>
<html>
<head>

<title>Shunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body class="shunterScreen">

<h2 id="vehicle"></h2>

<div id="taskArea">
Loading...
</div>

<br>

<div id="breakControls"></div>

<button onclick="logout()">End Shift</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

const vehicle=localStorage.getItem("vehicle")
const driver=localStorage.getItem("driver")

if(!vehicle){
window.location.href="shunter-login.html"
}

document.getElementById("vehicle").innerText=
vehicle+" - "+driver

let currentTask=null


/* ---------- LOAD TASK ---------- */

function loadTasks(){

db.ref("tasks").on("value",snap=>{

let tasks=[]

snap.forEach(child=>{
let t=child.val()
t.id=child.key
tasks.push(t)
})

tasks=tasks.filter(t=>t.status!=="completed")

tasks.sort((a,b)=>a.position-b.position)

let mine=tasks.find(t=>t.status==="accepted" && t.acceptedBy===vehicle)

let next=tasks.find(t=>t.status==="waiting")

currentTask=mine || next

renderTask()

})

}

loadTasks()


/* ---------- RENDER TASK ---------- */

function renderTask(){

const div=document.getElementById("taskArea")

if(!currentTask){

div.innerHTML="No tasks waiting"
return

}

let priority=currentTask.priority?"<div class='priority'>PRIORITY</div>":""

let location=""

if(currentTask.type==="Move Trailer"){

location=(currentTask.from||"")+" → "+(currentTask.to||"")

}else{

location="Bay "+currentTask.bay

}

let html=`

<h2>${currentTask.trailer}</h2>

<div class="big">${currentTask.type}</div>

<div class="big">${location}</div>

<div class="big">${currentTask.loadType || ""}</div>

${priority}

`

if(currentTask.status==="waiting"){

html+=`<button onclick="acceptCurrent()">ACCEPT</button>`

}

if(currentTask.status==="accepted" && currentTask.acceptedBy===vehicle){

html+=`<button onclick="completeCurrent()">COMPLETE</button>`

if(currentTask.priority){

html+=`<br><button onclick="notifyGatehouse('${currentTask.id}')">Notify Gatehouse</button>`

}

}

div.innerHTML=html

}


/* ---------- ACCEPT ---------- */

function acceptCurrent(){

if(!currentTask) return

acceptTask(currentTask.id)

}


/* ---------- COMPLETE ---------- */

function completeCurrent(){

if(!currentTask) return

completeTask(currentTask.id)

}


/* ---------- BREAK BUTTON CONTROL ---------- */

function updateBreakButtons(){

db.ref("shunters/"+vehicle).on("value",snap=>{

let s=snap.val()

const div=document.getElementById("breakControls")

if(!s || s.status!=="break"){

div.innerHTML=`
<button onclick="startBreak()">Start Break</button>
`

}else{

div.innerHTML=`
<button onclick="endBreak()">End Break</button>
`

}

})

}

updateBreakButtons()


/* ---------- BREAK FUNCTIONS ---------- */

function startBreak(){

db.ref("shunters/"+vehicle).update({

status:"break",
breakStart:Date.now()

})

}

function endBreak(){

db.ref("shunters/"+vehicle).update({

status:"available"

})

}


/* ---------- LOGOUT ---------- */

function logout(){

db.ref("shunters/"+vehicle).remove()

localStorage.clear()

window.location.href="index.html"

}

</script>

</body>
</html>
