<!DOCTYPE html>
<html>
<head>

<title>Shunter</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Shunter</h1>

<div class="instructions">

<b>Instructions</b>

<ul>
<li>If you login and someone else's name appears, click End Shift and log back in.</li>
<li>Wait for power completion confirmation on the radio before completing a Power DD job.</li>
<li>Only complete jobs once the move is fully finished.</li>
</ul>

</div>

<div id="loginBox">

<select id="vehicle">
<option value="OZS">OZS</option>
<option value="MYJ">MYJ</option>
<option value="XSH">XSH</option>
<option value="TZK">TZK</option>
<option value="SPARE">SPARE</option>
</select>

<input id="driverName" placeholder="Driver name">

<button onclick="loginShunter()">Login</button>

</div>

<div id="mainScreen" style="display:none">

<h2 id="vehicleTitle"></h2>

<div id="taskCard"></div>

<div class="shunterButtons">

<button onclick="startBreak()">Break</button>
<button onclick="endBreak()">End Break</button>
<button onclick="endShift()">End Shift</button>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

let vehicle = localStorage.getItem("vehicle")
let driver = localStorage.getItem("driver")

if(vehicle){

document.getElementById("loginBox").style.display="none"
document.getElementById("mainScreen").style.display="block"

document.getElementById("vehicleTitle").innerText = vehicle+" ("+driver+")"

logActivity("LOGIN")

watchTasks()

}

function loginShunter(){

vehicle = document.getElementById("vehicle").value
driver = document.getElementById("driverName").value

localStorage.setItem("vehicle",vehicle)
localStorage.setItem("driver",driver)

db.ref("shunters/"+vehicle).set({

vehicle:vehicle,
driver:driver,
status:"available"

})

logActivity("LOGIN")

document.getElementById("loginBox").style.display="none"
document.getElementById("mainScreen").style.display="block"

document.getElementById("vehicleTitle").innerText = vehicle+" ("+driver+")"

watchTasks()

}

function endShift(){

logActivity("LOGOUT")

db.ref("shunters/"+vehicle).remove()

localStorage.removeItem("vehicle")
localStorage.removeItem("driver")

location.reload()

}

</script>

</body>
</html>
