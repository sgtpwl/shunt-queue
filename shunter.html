<!DOCTYPE html>
<html>
<head>

<title>Shunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Shunter Screen</h1>

<div id="task"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

function loadTask(){

let vehicle=localStorage.getItem("vehicle")

db.ref("tasks").on("value",snap=>{

let tasks=[]

snap.forEach(child=>{
let t=child.val()
t.id=child.key
tasks.push(t)
})

tasks=tasks.filter(t=>t.status!=="completed")

tasks.sort((a,b)=>a.position-b.position)

let myTask=tasks.find(t=>t.status==="accepted" && t.acceptedBy===vehicle)

let nextTask=tasks.find(t=>t.status==="waiting")

let task=myTask || nextTask

let div=document.getElementById("task")

if(!task){

div.innerHTML="No tasks waiting"
return

}

let priority=task.priority ? "⚠ PRIORITY<br>" : ""

let load=task.loadType ? task.loadType.toUpperCase()+"<br>" : ""

let requester=`Requested by: ${task.requestedBy}`

let html=`

<h2>${task.trailer}</h2>

${priority}

${task.type}<br>

${task.from ? task.from+" → "+task.to : "Bay "+task.bay}<br>

${load}

${requester}

<br><br>

`

if(task.status==="waiting"){

html+=`<button onclick="acceptTask('${task.id}')">Accept</button>`

}

if(task.status==="accepted" && task.acceptedBy===vehicle){

html+=`<button onclick="completeTask('${task.id}')">Complete</button>`

if(task.priority){

html+=`<br><br><button onclick="notifyGatehouse('${task.id}')">Notify Gatehouse Bay Cleared</button>`

}

}

div.innerHTML=html

})

}

loadTask()

</script>

</body>
</html>
