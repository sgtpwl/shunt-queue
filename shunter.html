<!DOCTYPE html>
<html>
<head>

<title>Shunter Tasks</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div style="display:flex;justify-content:space-between;padding:10px;align-items:center;">

<h2 id="shunterName"></h2>

<div>

<button onclick="setBreak()">Break</button>
<button onclick="backFromBreak()">Back To Work</button>
<button onclick="endShift()">End Shift</button>

</div>

</div>

<h1 style="text-align:center;">Task</h1>

<div id="screen" style="padding:20px;text-align:center;">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>

<script>

function getShunter(){
return localStorage.getItem("shunterName");
}



function endShift(){

const name=getShunter();

db.ref("shunters/"+name).remove();

localStorage.removeItem("shunterName");

window.location.href="shunter-login.html";

}



function setBreak(){

const name=getShunter();

db.ref("shunters/"+name).update({
status:"break",
breakStart:Date.now()
});

document.getElementById("screen").innerHTML="<h2>ON BREAK</h2>";

}



function backFromBreak(){

const name=getShunter();

db.ref("shunters/"+name).update({
status:"available",
breakStart:null
});

loadTasks();

}



function acceptTask(id){

const name=getShunter();

db.ref("tasks/"+id).update({
status:"accepted",
acceptedBy:name
});

db.ref("shunters/"+name).update({
status:"busy"
});

}



function completeTask(id){

const name=getShunter();

db.ref("tasks/"+id).remove();

db.ref("shunters/"+name).update({
status:"available"
});

}



function connectPower(task){

const name=getShunter();

db.ref("powerConnections/"+name).set({
trailer:task.trailer,
bay:task.bay,
status:"connected"
});

db.ref("tasks/"+task.id).remove();

db.ref("shunters/"+name).update({
status:"power"
});

}



function acknowledgePower(){

const name=getShunter();

db.ref("powerConnections/"+name).remove();

db.ref("shunters/"+name).update({
status:"available"
});

}



function loadTasks(){

db.ref("tasks").on("value",snapshot=>{

const shunter=getShunter();
const div=document.getElementById("screen");

let tasks=[];

snapshot.forEach(child=>{
let t=child.val();
t.id=child.key;
tasks.push(t);
});

tasks.sort((a,b)=>a.position-b.position);

let myTask=tasks.find(t=>t.status==="accepted" && t.acceptedBy===shunter);

if(myTask){

if(myTask.type==="Provide Power (DD)"){

div.innerHTML=`
<h2>${myTask.trailer}</h2>
<p>Provide Power</p>
<p>Bay ${myTask.bay}</p>

<button onclick='connectPower(${JSON.stringify(myTask)})'
style="width:90%;height:80px;font-size:28px">
CONNECTED
</button>
`;

return;

}

div.innerHTML=`
<h2>${myTask.trailer}</h2>
<p>${myTask.type}</p>

<button onclick="completeTask('${myTask.id}')"
style="width:90%;height:80px;font-size:28px">
COMPLETE
</button>
`;

return;

}



let nextTask=tasks.find(t=>t.status==="waiting");

if(nextTask){

div.innerHTML=`
<h2>${nextTask.trailer}</h2>
<p>${nextTask.type}</p>

<button onclick="acceptTask('${nextTask.id}')"
style="width:90%;height:80px;font-size:28px">
ACCEPT
</button>
`;

return;

}

div.innerHTML="No tasks waiting";

});

}



function start(){

const shunter=getShunter();

document.getElementById("shunterName").innerText="Shunter: "+shunter;

db.ref("powerConnections/"+shunter).on("value",snap=>{

const power=snap.val();

if(power){

if(power.status==="connected"){

document.getElementById("screen").innerHTML=`
<h2>⚡ POWER CONNECTED</h2>
<p>${power.trailer}</p>
<p>Bay ${power.bay}</p>
`;

return;

}

if(power.status==="readyToDisconnect"){

document.getElementById("screen").innerHTML=`
<h2>POWER COMPLETE</h2>

<button onclick="acknowledgePower()"
style="width:90%;height:80px;font-size:28px">
ACKNOWLEDGE
</button>
`;

return;

}

}

loadTasks();

});

}



window.onload=function(){

const shunter=getShunter();

if(!shunter){
window.location.href="shunter-login.html";
return;
}

db.ref("shunters/"+shunter).set({
status:"available"
});

start();

}

</script>

</body>
</html>
