<!DOCTYPE html>
<html>
<head>
<title>Shunter Tasks</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;">
<h2 id="shunterName"></h2>
<button onclick="logout()">Logout</button>
</div>

<h1 style="text-align:center;">Next Task</h1>

<div id="nextTask" style="padding:20px;text-align:center;">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>

function logout(){
localStorage.removeItem("shunterName");
window.location.href="shunter-login.html";
}

function getShunter(){
return localStorage.getItem("shunterName");
}

function acceptTask(id){
db.ref("tasks/"+id).update({
status:"accepted",
acceptedBy:getShunter()
});
}

function completeTask(id){
db.ref("tasks/"+id).remove();
}

function connectPower(task){

const shunter = getShunter();

db.ref("powerConnections/"+shunter).set({
trailer: task.trailer,
bay: task.bay,
connectedAt: Date.now()
});

db.ref("tasks/"+task.id).remove();

}

function loadNextTask(){

db.ref("tasks").on("value",function(snapshot){

const shunter=getShunter();
const taskDiv=document.getElementById("nextTask");

let tasks=[];

snapshot.forEach(child=>{
let t=child.val();
t.id=child.key;
tasks.push(t);
});

tasks.sort((a,b)=>a.created-b.created);

let myTask=tasks.find(t=>t.status==="accepted" && t.acceptedBy===shunter);

if(myTask){

if(myTask.type==="Provide Power (DD)"){

taskDiv.innerHTML=`
<div class="task">
<h2>${myTask.trailer}</h2>
<p>Provide Power</p>
<p>Bay ${myTask.bay}</p>
<button onclick='connectPower(${JSON.stringify(myTask)})'
style="width:90%;height:80px;font-size:28px">
CONNECTED
</button>
</div>
`;

return;
}

taskDiv.innerHTML=`
<div class="task">
<h2>${myTask.trailer}</h2>
<p>${myTask.type}</p>
<p>${myTask.from||""} ${myTask.to?"→ "+myTask.to:""}</p>
<button onclick="completeTask('${myTask.id}')"
style="width:90%;height:80px;font-size:28px">
COMPLETE
</button>
</div>
`;

return;
}

let nextTask=tasks.find(t=>t.status==="waiting");

if(nextTask){

taskDiv.innerHTML=`
<div class="task">
<h2>${nextTask.trailer}</h2>
<p>${nextTask.type}</p>
<p>${nextTask.bay ? "Bay "+nextTask.bay : ""}</p>
<p>${nextTask.from||""} ${nextTask.to?"→ "+nextTask.to:""}</p>
<button onclick="acceptTask('${nextTask.id}')"
style="width:90%;height:80px;font-size:28px">
ACCEPT
</button>
</div>
`;

return;
}

taskDiv.innerHTML="No tasks waiting";

});

}

window.onload=function(){

const shunter=getShunter();

if(!shunter){
window.location.href="shunter-login.html";
return;
}

document.getElementById("shunterName").innerText="Shunter: "+shunter;

loadNextTask();

}

</script>

</body>
</html>
