<!DOCTYPE html>
<html>
<head>
  <title>Shunt Queue - Shunter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Next Task</h1>

<div id="nextTask">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>
function loadNextTask() {

  db.ref("tasks").on("value", snapshot => {

    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let firstTask = null;

    snapshot.forEach(child => {
      if (!firstTask) {
        firstTask = child.val();
      }
    });

    if (!firstTask) {
      taskDiv.innerHTML = "No tasks waiting";
      return;
    }

    taskDiv.innerHTML = `
      <div class="task">
        <h2>${firstTask.trailer}</h2>
        <p>${firstTask.type}</p>
        <p>${firstTask.from || ""} ${firstTask.to ? "→ " + firstTask.to : ""}</p>
        <p><b>Status:</b> ${firstTask.status}</p>
      </div>
    `;

  });

}

window.onload = loadNextTask;
</script>

</body>
</html>
