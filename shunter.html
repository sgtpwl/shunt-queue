<!DOCTYPE html>
<html>
<head>
  <title>Shunt Queue - Shunter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Next Task</h1>
<div id="nextTask">Loading...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyACwPAzBK_TFOyIuuI0iNzy_9zW-CKA7m4",
  authDomain: "shunt-queue.firebaseapp.com",
  databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shunt-queue",
  storageBucket: "shunt-queue.appspot.com",
  messagingSenderId: "773776993625",
  appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function getVehicle() {
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "Unknown";
}

function acceptTask(id) {
  db.ref("tasks/" + id).update({
    status: "accepted",
    acceptedBy: getVehicle()
  });
}

function completeTask(id) {
  db.ref("tasks/" + id).remove();
}

function loadNextTask() {

  db.ref("tasks").orderByChild("created").limitToFirst(1)
  .on("value", function(snapshot) {

    const taskDiv = document.getElementById("nextTask");
    taskDiv.innerHTML = "";

    let taskId = null;
    let task = null;

    snapshot.forEach(function(child) {
      taskId = child.key;
      task = child.val();
    });

    if (!task) {
      taskDiv.innerHTML = "No tasks waiting";
      return;
    }

    let buttons = "";

    if (task.status === "waiting") {
      buttons = `<button onclick="acceptTask('${taskId}')">ACCEPT</button>`;
    } else {
      buttons = `<button onclick="completeTask('${taskId}')">COMPLETE</button>`;
    }

    taskDiv.innerHTML = `
      <div class="task">
        <h2>${task.trailer}</h2>
        <p>${task.type}</p>
        <p>${task.from || ""} ${task.to ? "→ " + task.to : ""}</p>
        <p><b>Status:</b> ${task.status}</p>
        ${task.acceptedBy ? `<p><b>Accepted by:</b> ${task.acceptedBy}</p>` : ""}
        ${buttons}
      </div>
    `;

  });

}

window.onload = loadNextTask;

</script>

</body>
</html>
