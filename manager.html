<!DOCTYPE html>
<html>
<head>

<title>Manager - Shunt Queue</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Manager</h1>

<div id="who"></div>

<button onclick="logout()">Logout</button>

<hr>

<h2>Shunter Status</h2>

<div id="shunterStatus"></div>

<hr>

<h2>Create Task</h2>

<select id="taskType" onchange="toggleTaskInputs()">
<option value="move">Move Trailer</option>
<option value="power">Provide Power (DD)</option>
</select>

<br><br>

<label>
<input type="checkbox" id="priority">
Gatehouse Priority
</label>

<br><br>

<div id="moveFields">

<input id="trailer" placeholder="Trailer Number">
<input id="from" placeholder="From">
<input id="to" placeholder="To">

<br><br>

<select id="loadType">
<option value="Full Load">Full Load</option>
<option value="Empty Trailer">Empty Trailer</option>
<option value="Trunk Trailer">Trunk Trailer</option>
</select>

</div>

<div id="powerFields" style="display:none">

<input id="powerTrailer" placeholder="Trailer Number">

<br><br>

<select id="bay">
<option value="">Select Bay</option>
</select>

</div>

<br><br>

<button onclick="addTask(this)">Submit Task</button>

<hr>

<h2>Queue</h2>

<div class="queueHeader">

<div>#</div>
<div>Trailer</div>
<div>Job</div>
<div>From</div>
<div>To</div>
<div>Load</div>
<div>Requested By</div>
<div>Status</div>
<div>Shunter</div>
<div>Move</div>

</div>

<div id="tasks"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

function logout(){
localStorage.clear()
window.location.href="index.html"
}

function toggleTaskInputs(){

const type=document.getElementById("taskType").value

document.getElementById("moveFields").style.display=(type==="move")?"block":"none"
document.getElementById("powerFields").style.display=(type==="power")?"block":"none"

}

function populateBays(){

const bay=document.getElementById("bay")

for(let i=1;i<=25;i++){
let o=document.createElement("option")
o.value="B"+i
o.innerText="B"+i
bay.appendChild(o)
}

for(let i=1;i<=26;i++){
let o=document.createElement("option")
o.value="C"+i
o.innerText="C"+i
bay.appendChild(o)
}

}

populateBays()

/* ---------- QUEUE ---------- */

db.ref("tasks").on("value",snap=>{

let all=[]

snap.forEach(child=>{
let t=child.val()
t.id=child.key
all.push(t)
})

all.sort((a,b)=>(a.position||0)-(b.position||0))

const tasks=all.filter(t=>t.status!=="completed")

const div=document.getElementById("tasks")
div.innerHTML=""

tasks.forEach((t,i)=>{

const row=document.createElement("div")
row.className="managerRow"

row.innerHTML=`

<div>${i+1}</div>
<div>${t.trailer||""}</div>
<div>${t.type||""}</div>
<div>${t.from||""}</div>
<div>${t.to||t.bay||""}</div>
<div>${t.loadType||""}</div>
<div>${t.requestedBy||""}</div>
<div>${t.status||""}</div>
<div>${t.acceptedBy||""}</div>
<div id="controls-${t.id}"></div>

`

div.appendChild(row)

const controls=document.getElementById("controls-"+t.id)

if(t.status==="waiting" && i>=4){

const up=document.createElement("button")
up.innerText="▲"
up.onclick=()=>moveUp(t.id)

const down=document.createElement("button")
down.innerText="▼"
down.onclick=()=>moveDown(t.id)

controls.appendChild(up)
controls.appendChild(down)

}

})

})

/* ---------- SHUNTER STATUS ---------- */

db.ref("shunters").on("value",snap=>{

const div=document.getElementById("shunterStatus")
div.innerHTML=""

snap.forEach(child=>{

const s=child.val()

let icon="🟢"

if(s.status==="moving") icon="🟡"
if(s.status==="power") icon="🔵"
if(s.status==="break") icon="🔴"

let row=document.createElement("div")

row.innerHTML=`<b>${child.key}</b> (${s.driver}) ${icon} ${s.status}`

div.appendChild(row)

})

})

</script>

<div class="footer">
Shunt Queue System<br>
© Lee Powell 2026
</div>

</body>
</html>
