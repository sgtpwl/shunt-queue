<!DOCTYPE html>
<html>
<head>
  <title>Manager - Shunt Queue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Manager</h1>

<h2>Create Task</h2>

<select id="taskType" onchange="toggleTaskInputs()">
  <option value="move">Move Trailer</option>
  <option value="power">Provide Power (DD)</option>
</select>

<div style="margin-top:8px;">
  <label>
    <input type="checkbox" id="priority">
    Gatehouse Priority
  </label>
</div>

<div id="moveFields" style="margin-top:10px;">
  <input id="trailer" placeholder="Trailer Number">
  <input id="from" placeholder="From Location">
  <input id="to" placeholder="To Location">

  <select id="loadType">
    <option>Full Load</option>
    <option>Empty Trailer</option>
    <option selected>Trunk Trailer</option>
  </select>
</div>

<div id="powerFields" style="display:none; margin-top:10px;">
  <input id="powerTrailer" placeholder="Trailer Number">
  <select id="bay">
    <option value="">Select Bay</option>
  </select>
</div>

<br>
<button onclick="addTask(this)">Submit Task</button>
<p id="msg"></p>

<hr>

<h2>Queue</h2>
<div id="tasks"></div>

<hr>

<h2>Active Power</h2>
<div id="powerConnections"></div>

<hr>

<h2>Shunters</h2>
<div id="shunterStatus"></div>

<script>
  function toggleTaskInputs(){
    const type = document.getElementById("taskType").value;
    document.getElementById("moveFields").style.display = (type==="move") ? "block" : "none";
    document.getElementById("powerFields").style.display = (type==="power") ? "block" : "none";
  }

  // populate bays
  (function(){
    const bay = document.getElementById("bay");
    for (let i=1;i<=25;i++){
      const o=document.createElement("option");
      o.value="B"+i; o.innerText="B"+i;
      bay.appendChild(o);
    }
    for (let i=1;i<=26;i++){
      const o=document.createElement("option");
      o.value="C"+i; o.innerText="C"+i;
      bay.appendChild(o);
    }
  })();
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>
  function renderManagerQueue(){
    db.ref("tasks").on("value", snap => {

      const div = document.getElementById("tasks");
      div.innerHTML = "";

      let tasks = [];
      snap.forEach(child=>{
        let t = child.val() || {};
        t.id = child.key;
        tasks.push(t);
      });

      tasks.sort((a,b)=>(a.position||0)-(b.position||0));

      tasks.forEach((t, idx)=>{
        const row=document.createElement("div");
        row.className="task";

        const pri = t.priority ? "⚠ PRIORITY<br>" : "";
        const loc = (t.type==="Move Trailer")
          ? `${t.from || ""} → ${t.to || ""}<br>${(t.loadType || "").toUpperCase()}`
          : `Bay ${t.bay || ""}`;

        let html = `
          <b>${idx+1}. ${t.trailer || ""}</b><br>
          ${pri}
          ${t.type || ""}<br>
          ${loc}<br>
          Status: ${t.status || ""}
        `;

        if (t.status === "accepted") {
          html += `<br>Accepted: ${t.acceptedBy || ""} (${t.driver || ""})`;
        }

        row.innerHTML = html;

        // Reorder buttons: only for waiting tasks, and only after first 4 (idx >= 4)
        if (t.status === "waiting" && idx >= 4) {
          const up=document.createElement("button");
          up.innerText="▲";
          up.onclick=()=>moveUp(t.id);

          const down=document.createElement("button");
          down.innerText="▼";
          down.onclick=()=>moveDown(t.id);

          row.appendChild(up);
          row.appendChild(down);
        }

        // Delete: only waiting tasks
        if (t.status === "waiting") {
          const del=document.createElement("button");
          del.innerText="Delete";
          del.onclick=()=>deleteTask(t.id);
          row.appendChild(del);
        }

        div.appendChild(row);
      });

    });
  }

  function renderPower(){
    db.ref("powerConnections").on("value", snap => {
      const div=document.getElementById("powerConnections");
      div.innerHTML="";

      snap.forEach(child=>{
        const v=child.key;
        const p=child.val() || {};
        if (p.status !== "connected") return;

        const row=document.createElement("div");
        row.className="task";

        const btn=document.createElement("button");
        btn.innerText="Finish Power";
        btn.onclick=()=>finishPower(v, btn);

        row.innerHTML = `<b>${v}</b> ⚡ Bay ${p.bay || ""} — ${p.trailer || ""}<br>`;
        row.appendChild(btn);
        div.appendChild(row);
      });
    });
  }

  function renderShunters(){
    db.ref("shunters").on("value", snap => {
      const div=document.getElementById("shunterStatus");
      div.innerHTML="";

      snap.forEach(child=>{
        const v=child.key;
        const s=child.val() || {};
        const row=document.createElement("div");
        row.className="task";
        row.innerHTML = `<b>${v}</b> — ${s.driver || ""} — ${s.status || ""}`;
        div.appendChild(row);
      });
    });
  }

  renderManagerQueue();
  renderPower();
  renderShunters();
</script>

</body>
</html>
