<!DOCTYPE html>
<html>
<head>
<title>Manager - Shunt Queue</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Shunt Queue</h1>

<h2>Queue</h2>
<div id="tasks"></div>

<h2>Active Power</h2>
<div id="powerList"></div>

<h2>Shunter Status</h2>
<div id="shunters"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

<script>

function renderManager(){

db.ref("tasks").on("value",snapshot=>{

const div=document.getElementById("tasks");
div.innerHTML="";

let tasks=[];

snapshot.forEach(child=>{
let t=child.val();
t.id=child.key;
tasks.push(t);
});

tasks.sort((a,b)=>a.position-b.position);

tasks.forEach((t,i)=>{

let row=document.createElement("div");
row.className="task";

let html=`<b>${t.trailer}</b> - ${t.type}<br>`;

if(t.acceptedBy){
html+=`Accepted by ${t.acceptedBy} (${t.driver})<br>`;
}else{
html+=`Waiting<br>`;
}

if(i>3 && !t.acceptedBy){

html+=`
<button onclick="moveUp('${t.id}')">↑</button>
<button onclick="moveDown('${t.id}')">↓</button>
`;

}

if(!t.acceptedBy){

html+=`
<button onclick="deleteTask('${t.id}')">Delete</button>
`;

}

row.innerHTML=html;
div.appendChild(row);

});

});

}

function renderPower(){

db.ref("powerConnections").on("value",snapshot=>{

const div=document.getElementById("powerList");
div.innerHTML="";

snapshot.forEach(child=>{

let p=child.val();

if(p.status==="connected"){

let row=document.createElement("div");
row.className="task";

row.innerHTML=`
${child.key} powering ${p.trailer} at bay ${p.bay}
<button onclick="finishPower('${child.key}')">Finish Power</button>
`;

div.appendChild(row);

}

});

});

}

function renderShunters(){

db.ref("shunters").on("value",snapshot=>{

const div=document.getElementById("shunters");
div.innerHTML="";

snapshot.forEach(child=>{

let s=child.val();

let row=document.createElement("div");
row.className="task";

row.innerHTML=`
${child.key} - ${s.driver} - ${s.status}
`;

div.appendChild(row);

});

});

}

renderManager();
renderPower();
renderShunters();

</script>

</body>
</html>
