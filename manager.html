<!DOCTYPE html>
<html>
<head>
<title>Shunt Queue - Supervisor</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Add Shunt Task (Supervisor)</h1>

<input id="trailer" placeholder="Trailer number">

<select id="type" onchange="updateForm()">
<option value="Move Trailer">Move Trailer</option>
<option value="Provide Power (DD)">Provide Power (DD)</option>
<option value="Remove Power (DD)">Remove Power (DD)</option>
</select>

<div id="moveFields">

<input id="from" placeholder="From location">
<input id="to" placeholder="To location">

</div>

<div id="powerFields" style="display:none">

<select id="bay">

<option value="">Select Bay</option>

<option>B1</option><option>B2</option><option>B3</option><option>B4</option><option>B5</option>
<option>B6</option><option>B7</option><option>B8</option><option>B9</option><option>B10</option>
<option>B11</option><option>B12</option><option>B13</option><option>B14</option><option>B15</option>
<option>B16</option><option>B17</option><option>B18</option><option>B19</option><option>B20</option>
<option>B21</option><option>B22</option><option>B23</option><option>B24</option><option>B25</option>

<option>C1</option><option>C2</option><option>C3</option><option>C4</option><option>C5</option>
<option>C6</option><option>C7</option><option>C8</option><option>C9</option><option>C10</option>
<option>C11</option><option>C12</option><option>C13</option><option>C14</option><option>C15</option>
<option>C16</option><option>C17</option><option>C18</option><option>C19</option><option>C20</option>
<option>C21</option><option>C22</option><option>C23</option><option>C24</option><option>C25</option>
<option>C26</option>

</select>

</div>

<button onclick="addTask(this)">Submit Task</button>

<h2>⚡ Active Power</h2>
<div id="powerConnections"></div>

<script>

function updateForm(){

const type=document.getElementById("type").value;

const move=document.getElementById("moveFields");
const power=document.getElementById("powerFields");

if(type==="Move Trailer"){

move.style.display="block";
power.style.display="none";

}else{

move.style.display="none";
power.style.display="block";

}

}

</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
