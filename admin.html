<!DOCTYPE html>
<html>
<head>

<title>Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Admin Panel</h1>

<h2>Reset Shunters</h2>

<button onclick="resetVehicle('OZS')">Reset OZS</button>
<button onclick="resetVehicle('MYJ')">Reset MYJ</button>
<button onclick="resetVehicle('XSH')">Reset XSH</button>
<button onclick="resetVehicle('TZK')">Reset TZK</button>
<button onclick="resetVehicle('SPARE')">Reset SPARE</button>

<br><br>

<button onclick="resetAll()">Reset All Shunters</button>

<hr>

<h2>Reset Power Connections</h2>

<button onclick="resetPower()">Clear Power Jobs</button>

<hr>

<h2>Completed Jobs</h2>

<div>

<button onclick="setFilter('today')">Today</button>
<button onclick="setFilter('24h')">24 Hours</button>
<button onclick="setFilter('7d')">7 Days</button>
<button onclick="setFilter('30d')">30 Days</button>

</div>

<br>

<div class="queueHeader">

<div>Trailer</div>
<div>Job</div>
<div>From</div>
<div>To/Bay</div>
<div>Load</div>
<div>Requested</div>
<div>Accepted</div>
<div>Completed</div>
<div>Duration</div>

</div>

<div id="completed"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

<script>

let filter="today"

function setFilter(f){

filter=f
loadCompleted()

}

function resetVehicle(vehicle){

db.ref("shunters/"+vehicle).remove()

alert(vehicle+" reset")

}

function resetAll(){

db.ref("shunters").remove()

alert("All shunters reset")

}

function resetPower(){

db.ref("powerConnections").remove()

alert("Power connections cleared")

}

function loadCompleted(){

db.ref("tasks").once("value").then(snap=>{

let div=document.getElementById("completed")

div.innerHTML=""

let now=Date.now()

snap.forEach(child=>{

let t=child.val()

if(t.status!=="completed") return

let age=now-(t.completedTime||0)

if(filter==="today" && age>86400000) return
if(filter==="24h" && age>86400000) return
if(filter==="7d" && age>604800000) return
if(filter==="30d" && age>2592000000) return

let duration=""

if(t.completedTime && t.acceptedTime){

duration=Math.round((t.completedTime-t.acceptedTime)/1000)+"s"

}

let row=document.createElement("div")

row.className="managerRow"

row.innerHTML=`

<div>${t.trailer}</div>
<div>${t.type}</div>
<div>${t.from||""}</div>
<div>${t.to||t.bay||""}</div>
<div>${t.loadType||""}</div>
<div>${new Date(t.created).toLocaleTimeString()}</div>
<div>${new Date(t.acceptedTime||0).toLocaleTimeString()}</div>
<div>${new Date(t.completedTime||0).toLocaleTimeString()}</div>
<div>${duration}</div>

`

div.appendChild(row)

})

})

}

loadCompleted()

</script>

<div class="footer">
Shunt Queue System<br>
© Lee Powell 2026
</div>

</body>
</html>
