<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Admin Dashboard</h1>

<h2>System Tools</h2>

<button onclick="resetShunters()">Reset Shunters</button>
<button onclick="clearPower()">Clear Power Connections</button>

<h2>Live Yard Status</h2>
<div id="yardStatus"></div>

<h2>Completed Tasks</h2>
<div id="completedTasks"></div>

<button onclick="downloadCSV()">Download CSV Report</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>

let tasksData=[];
let powerData={};
let shuntersData={};

function minutes(ms){
return Math.floor(ms/60000);
}

function loadAll(){

db.ref("tasks").on("value",snap=>{

tasksData=[];

snap.forEach(child=>{
let t=child.val();
t.id=child.key;
tasksData.push(t);
});

renderCompleted();

});

db.ref("powerConnections").on("value",snap=>{

powerData={};

snap.forEach(child=>{
powerData[child.key]=child.val();
});

renderYard();

});

db.ref("shunters").on("value",snap=>{

shuntersData={};

snap.forEach(child=>{
shuntersData[child.key]=child.val();
});

renderYard();

});

}

function renderYard(){

const div=document.getElementById("yardStatus");
div.innerHTML="";

Object.keys(shuntersData).forEach(v=>{

let s=shuntersData[v];

let row=document.createElement("div");
row.className="task";

if(powerData[v] && powerData[v].status==="connected"){

row.innerHTML=`${v} ⚡ Power Bay ${powerData[v].bay}`;

}else if(s.status==="break"){

row.innerHTML=`${v} Break`;

}else{

row.innerHTML=`${v} Available`;

}

div.appendChild(row);

});

}

function renderCompleted(){

const div=document.getElementById("completedTasks");
div.innerHTML="";

tasksData
.filter(t=>t.status==="completed")
.sort((a,b)=>b.completedTime-a.completedTime)
.forEach(t=>{

let delay=minutes(t.acceptedTime-t.created);
let dur=minutes(t.completedTime-t.acceptedTime);

let row=document.createElement("div");
row.className="task";

row.innerHTML=`
Trailer ${t.trailer}<br>
Vehicle ${t.acceptedBy}<br>
Driver ${t.driver}<br>
Delay ${delay} min<br>
Duration ${dur} min
`;

div.appendChild(row);

});

}

function downloadCSV(){

let csv="Trailer,Vehicle,Driver,Delay,Duration\n";

tasksData
.filter(t=>t.status==="completed")
.forEach(t=>{

let delay=minutes(t.acceptedTime-t.created);
let dur=minutes(t.completedTime-t.acceptedTime);

csv+=`${t.trailer},${t.acceptedBy},${t.driver},${delay},${dur}\n`;

});

let blob=new Blob([csv]);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="shunt-report.csv";
a.click();

}

function resetShunters(){

if(confirm("Reset all shunters?")){

db.ref("shunters").remove();

}

}

function clearPower(){

if(confirm("Clear all power connections?")){

db.ref("powerConnections").remove();

}

}

loadAll();

</script>

</body>
</html>
