<!DOCTYPE html>
<html>
<head>

<title>Admin - Completed Jobs</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Completed Job Records</h1>

<div class="queueHeader">

<div>Trailer</div>
<div>Job</div>
<div>From</div>
<div>To</div>
<div>Load</div>
<div>Supervisor</div>
<div>Shunter</div>
<div>Requested</div>
<div>Accepted</div>
<div>Completed</div>

</div>

<div id="records"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="config.js"></script>

<script>

function formatTime(ts){

if(!ts) return ""

const d=new Date(ts)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

db.ref("tasks").on("value",snap=>{

let records=[]

snap.forEach(child=>{

let t=child.val()

if(t.status==="completed"){

records.push(t)

}

})

records.sort((a,b)=>(b.completedTime||0)-(a.completedTime||0))

const div=document.getElementById("records")

div.innerHTML=""

records.forEach(t=>{

let row=document.createElement("div")

row.className="task"

row.innerHTML=`

<div>${t.trailer||""}</div>

<div>${t.type||""}</div>

<div>${t.from||""}</div>

<div>${t.to||t.bay||""}</div>

<div>${t.loadType||""}</div>

<div>${t.requestedBy||""}</div>

<div>${t.acceptedBy||""}</div>

<div>${formatTime(t.created)}</div>

<div>${formatTime(t.acceptedTime)}</div>

<div>${formatTime(t.completedTime)}</div>

`

div.appendChild(row)

})

})

</script>

</body>
</html>
